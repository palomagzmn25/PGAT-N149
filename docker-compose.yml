version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: notarial_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: notarial_user
      POSTGRES_PASSWORD: notarial_pass
      POSTGRES_DB: notarial_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
